name: docker-publish

# Build the interactive R (IRkernel) session container and push it to Docker Hub
# as a public image. Requires repo/org secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# (an access token with write to the `pennsieve` namespace).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  # Adjust if the Docker Hub repo name differs.
  IMAGE: pennsieve/r-session

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Cheap sanity that the processor code compiles before we build/push.
      - run: python -m py_compile processor/*.py

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          # Fargate is x86_64 by default. arm64 (Graviton) is heavier to build
          # for an R/Jupyter image under emulation — add linux/arm64 here if you
          # run interactive tasks on Graviton.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
